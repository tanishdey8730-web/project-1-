<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - Sharda Setu</title>
  <link rel="stylesheet" href="signup.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <form class="signup-box">
      <h1>Create Account</h1>
      <p class="subtitle">Fill in the details to get started</p>

      <label class="label">I want to:</label>
      <div class="radio-group">
        <label><input type="radio" name="role" checked> Learn (Student)</label>
        <label><input type="radio" name="role"> Teach (Teacher)</label>
      </div>

      <label class="label" for="name">Full Name</label>
      <div class="input-wrapper">
        <span class="icon">👤</span>
        <input type="text" id="name" placeholder="Enter your full name">
      </div>

      <label class="label" for="email">Email Address</label>
      <div class="input-wrapper">
        <span class="icon">📧</span>
        <input type="email" id="email" placeholder="Enter your email">
      </div>

      <label class="label" for="password">Password</label>
      <div class="input-wrapper">
        <span class="icon">🔒</span>
        <input type="password" id="password" placeholder="Create a password (min 6 characters)">
      </div>

      <label class="label" for="confirm-password">Confirm Password</label>
      <div class="input-wrapper">
        <span class="icon">🔒</span>
        <input type="password" id="confirm-password" placeholder="Confirm your password">
      </div>

      <div class="checkbox-group">
        <label>
          <input type="checkbox" required>
          I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
        </label>
      </div>

      <button type="submit" class="btn">Create Account</button>

      <p class="signin">Already have an account? <a href="login.html">Sign in here</a></p>
    </form>
  </div>
</body>
</html>
