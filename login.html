<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Sharda Setu</title>
  <link rel="stylesheet" href="login.css">
  <link rel="stylesheet" href="ui-enhancements.css">
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="auth-layout">
    <div class="auth-banner">
      <img src="assets/logo.svg" alt="Sharda Setu" width="56" height="56"/>
      <h2>Welcome Back</h2>
      <p>Sign in to access your profile, exam goals, and curated competitive exam playlists.</p>
      <img class="auth-banner-photo" src="https://images.unsplash.com/photo-1427504494785-3a9ca7044f45?auto=format&fit=crop&w=600&q=80" alt="Students learning"/>
    </div>
    <div class="container">
      <form class="login-box" id="login-form">
        <h1>Sign In</h1>
        <p class="subtitle">Enter your credentials to access your account</p>
        <p id="login-error" class="form-error" role="alert"></p>

        <label class="label">I am a:</label>
        <div class="radio-group">
          <label><input type="radio" name="role" value="student" checked> Student</label>
          <label><input type="radio" name="role" value="teacher"> Teacher</label>
        </div>

        <label class="label" for="email">Email Address</label>
        <div class="input-wrapper">
          <span class="icon">📧</span>
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>

        <label class="label" for="password">Password</label>
        <div class="input-wrapper">
          <span class="icon">🔒</span>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>

        <div class="options">
          <label><input type="checkbox"> Remember me</label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>

        <button type="submit" class="btn">Sign In</button>
        <p class="signup">Don't have an account? <a href="signup.html">Sign up here</a></p>
        <a href="index.html" class="back">&larr; Back to Home</a>
      </form>
    </div>
  </div>
  <script src="auth.js"></script>
  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const err = document.getElementById("login-error");
      err.textContent = "";
      try {
        await ShardaAuth.login({
          email: document.getElementById("email").value,
          password: document.getElementById("password").value
        });
        const next = new URLSearchParams(window.location.search).get("next");
        window.location.href = next && !next.includes("://") ? next : "profile.html";
      } catch (ex) {
        err.textContent = ex.message || "Login failed. Start the server with npm start.";
      }
    });
  </script>
</body>
</html>
