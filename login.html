<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Sharda Setu</title>
  <link rel="stylesheet" href="login.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <form class="login-box">
      <h1>Sign In</h1>
      <p class="subtitle">Enter your credentials to access your account</p>

      <label class="label">I am a:</label>
      <div class="radio-group">
        <label><input type="radio" name="role" checked> Student</label>
        <label><input type="radio" name="role"> Teacher</label>
      </div>

      <label class="label" for="email">Email Address</label>
      <div class="input-wrapper">
        <span class="icon">📧</span>
        <input type="email" id="email" placeholder="Enter your email">
      </div>

      <label class="label" for="password">Password</label>
      <div class="input-wrapper">
        <span class="icon">🔒</span>
        <input type="password" id="password" placeholder="Enter your password">
      </div>

      <div class="options">
        <label><input type="checkbox"> Remember me</label>
        <a href="#" class="forgot">Forgot password?</a>
      </div>

      <button type="submit" class="btn">Sign In</button>

      <p class="signup">Don’t have an account? <a href="#">Sign up here</a></p>
      <a href="index.html" class="back">&larr; Back to Home</a>
    </form>
  </div>
</body>
</html>
